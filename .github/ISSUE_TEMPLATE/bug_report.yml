name: Bug report
description: Report a reproducible defect in the benchmark, tools, or documentation.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Adaptive-Agent.
        Please include enough detail for someone else to reproduce the issue locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Share exact commands, inputs, or tasks needed to reproduce the issue.
      placeholder: |
        1. python -m autotoolbench make-data --seed 0
        2. python -m autotoolbench run --task-id T001 --agent adaptive --noise 0.2
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: main@abcdef1 or v0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and whether you used mock or OpenAI backend.
      placeholder: Python 3.11, macOS 15, mock backend
  - type: textarea
    id: artifacts
    attributes:
      label: Relevant artifacts
      description: Link logs, trajectory JSON, or screenshots if available.
